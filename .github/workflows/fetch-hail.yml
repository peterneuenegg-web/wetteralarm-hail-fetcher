name: fetch-hail

env:
  # Actions auf Node 24 opten (Node 20 wird Juni 2026 entfernt)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    # Alle 5 Minuten. GitHub-Cron ist best-effort — beobachtete Realität:
    # nur alle 1-3 Stunden ein Run (Plattform-Last). Deshalb LOOKBACK_MINUTES
    # auf 240 (4h) erhöht, damit auch grössere Lücken überdeckt werden.
    # Ingest-Endpoint ist idempotent (`?check=…`) — Re-Submission kostet nichts.
    # Ausserhalb der Saison (Oktober-März) endet das Python-Script früh.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "stage oder production"
        required: true
        default: "stage"
        type: choice
        options:
          - stage
          - production

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch (stage)
        if: github.event_name == 'schedule' || github.event.inputs.target == 'stage'
        env:
          INGEST_URL: ${{ secrets.STAGE_INGEST_URL }}
          INGEST_TOKEN: ${{ secrets.STAGE_INGEST_TOKEN }}
          # Heartbeat-Endpoint im Schaden-Tool — wird mit dem Ingest-Token
          # authentifiziert. Schreibt cron_heartbeats.last_success_at, damit
          # check_heartbeats den GitHub-Worker im Monitoring sieht.
          HEARTBEAT_URL: https://schaden.wetteralarm.ch/stage/api/external-heartbeat.php?job=fetch_hail
          POH_THRESHOLD: "10"
          LOOKBACK_MINUTES: "240"
        run: python fetch_hail.py

      - name: Fetch (production)
        # Bei Schedule-Trigger und bei manuellem Trigger mit target=production
        # beschicken wir Prod. Stage wird oben bei jedem Schedule-Trigger
        # ebenfalls bedient — beide Umgebungen bekommen die gleichen Pixel.
        # `if: always()` würde auch bei Stage-Failure laufen — wir wollen
        # explizit den Schedule-Pfad ODER die manuelle Prod-Wahl.
        if: github.event_name == 'schedule' || github.event.inputs.target == 'production'
        env:
          INGEST_URL: ${{ secrets.PROD_INGEST_URL }}
          INGEST_TOKEN: ${{ secrets.PROD_INGEST_TOKEN }}
          HEARTBEAT_URL: https://schaden.wetteralarm.ch/api/external-heartbeat.php?job=fetch_hail
          POH_THRESHOLD: "10"
          LOOKBACK_MINUTES: "240"
        run: python fetch_hail.py
