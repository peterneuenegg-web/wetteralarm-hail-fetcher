name: fetch-hail

on:
  schedule:
    # Alle 5 Minuten. GitHub-Cron ist best-effort — ausserhalb der Saison
    # (Oktober-März) endet das Python-Script früh mit Exit 0.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "stage oder production"
        required: true
        default: "stage"
        type: choice
        options:
          - stage
          - production

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch (stage)
        if: github.event_name == 'schedule' || github.event.inputs.target == 'stage'
        env:
          INGEST_URL: ${{ secrets.STAGE_INGEST_URL }}
          INGEST_TOKEN: ${{ secrets.STAGE_INGEST_TOKEN }}
          POH_THRESHOLD: "10"
          LOOKBACK_MINUTES: "30"
        run: python fetch_hail.py

      - name: Fetch (production)
        if: github.event.inputs.target == 'production'
        env:
          INGEST_URL: ${{ secrets.PROD_INGEST_URL }}
          INGEST_TOKEN: ${{ secrets.PROD_INGEST_TOKEN }}
          POH_THRESHOLD: "10"
          LOOKBACK_MINUTES: "30"
        run: python fetch_hail.py
